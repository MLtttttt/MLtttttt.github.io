<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#ffe59b">
  <title>MLttt 的算法笔记</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="shell">
    <aside class="sidebar" aria-label="算法笔记导航">
      <a class="brand" href="#/STL">
        <img src="./assets/lazy-toast.png" alt="懒羊羊头像">
        <span>
          <strong>MLttt</strong>
          <small>算法笔记</small>
        </span>
      </a>

      <label class="search">
        <span>Search</span>
        <input id="searchInput" type="search" placeholder="搜板子、标题、关键词">
      </label>

      <nav id="noteList" class="note-list"></nav>
    </aside>

    <main class="main">
      <section class="hero">
        <div class="hero-copy">
          <p class="eyebrow">MLttt 菜鸡逆袭记</p>
          <h1>把算法板子，整理成随手能翻的个人博客。</h1>
          <p class="subtitle">STL、数论、图论、动态规划、数据结构，困了也能找到模板。</p>
          <div class="hero-actions">
            <a class="btn primary" href="#/我要成为板神">看板子</a>
            <a class="btn" href="https://github.com/MLtttttt/MLttt-.git" target="_blank" rel="noreferrer">旧仓库</a>
          </div>
        </div>
        <div class="hero-art" aria-hidden="true">
          <img src="./assets/lazy-typing.png" alt="">
        </div>
      </section>

      <section class="content-wrap">
        <article id="article" class="article">
          <div class="loading">正在加载笔记...</div>
        </article>
      </section>
    </main>
  </div>

  <button id="topButton" class="top-button" type="button" aria-label="回到顶部">↑</button>
  <script src="./app.js"></script>
</body>
</html>
